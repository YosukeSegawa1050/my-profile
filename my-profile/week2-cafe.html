<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSSE課題week2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">

    <div class="bg-white rounded shadow p-2 w-96 mx-auto">

        <!--ここヘッダー-->
        <div class="p-2 bg-brown-300 w-80 h-auto rounded-lg ">
            <a href="https://www.doutor.co.jp/dcs/menu/" class="hover:opacity-75 transition-opacity"><img src="../img-doutor/logo_dcs.png" alt="ドトールコーヒーlogo" class="w-30 h-auto"> </a>

        </div>

        <span class="text-xl font-bold pt-4 px-2 pb-2">メニュー</span>

        <!--写真と文章を9個表示 -->
        <div class="grid grid-cols-3 gap-1 m-1 my-2">

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/season.jpg" alt="season menu" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">季節のおすすめ</span>
                <span class="text-sm text-yellow-500">SEASONAL MENU</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/hotdrink.jpg" alt="hotdrink" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">ホットドリンク</span>
                <span class="text-sm text-yellow-500">HOT DRINKS</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/icedrink.jpg" alt="icedrink" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">アイスドリンク</span>
                <span class="text-sm text-yellow-500">ICE DRINK</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/milano.jpg" alt="milanosandwitch" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">ミラノサンド</span>
                <span class="text-sm text-yellow-500">MILANO SANDWICH</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/hotdog.jpg" alt="hotdog" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">ジャーマンドック</span>
                <span class="text-sm text-yellow-500">HOT DOG</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/morning.jpg" alt="morning set" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">モーニング・セット</span>
                <span class="text-sm text-yellow-500">MORNING SET</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/hotsandwich.jpg" alt="hotsandwich" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">ホットサンド</span>
                <span class="text-sm text-yellow-500">HOT SANDWICH</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/toast.jpg" alt="toast" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">トースト</span>
                <span class="text-sm text-yellow-500">TOAST</span>
            </div>

            <div class="flex flex-col items-center ">
                <img src="../img-doutor/sweets.jpg" alt="sweets" class="w-50 h-auto hover:opacity-50 transition-opacity">
                <span class="text-lg">デザート</span>
                <span class="text-sm text-yellow-500">DESSERT</span>
            </div>

        </div>


    </div>


</body>
</html>
